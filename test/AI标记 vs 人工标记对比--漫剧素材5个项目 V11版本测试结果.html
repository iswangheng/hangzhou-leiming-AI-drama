<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI标记 vs 人工标记对比</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .project-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }

        .project-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #2d3748;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .marks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .marks-column {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .column-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .human-title {
            color: #e53e3e;
        }

        .ai-title {
            color: #3182ce;
        }

        .count-badge {
            background: #edf2f7;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .marks-table {
            width: 100%;
            border-collapse: collapse;
        }

        .marks-table th {
            background: #e2e8f0;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a5568;
            border-radius: 6px;
        }

        .marks-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        .marks-table tr:hover {
            background: #edf2f7;
        }

        .marks-table tr:last-child td {
            border-bottom: none;
        }

        .episode-cell {
            font-weight: 600;
            color: #4a5568;
            width: 80px;
        }

        .timestamp-cell {
            color: #2d3748;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            width: 80px;
        }

        .type-cell {
            color: #718096;
            width: 100px;
        }

        .detail-cell {
            color: #4a5568;
            font-size: 0.85rem;
        }

        .highlight-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .detail-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #edf2f7;
            color: #4a5568;
        }

        .highlight-human {
            background: #fed7d7;
            color: #c53030;
        }

        .highlight-ai {
            background: #bee3f8;
            color: #2b6cb0;
        }

        @media (max-width: 1024px) {
            .marks-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .project-title {
                font-size: 1.4rem;
            }

            .marks-table th,
            .marks-table td {
                padding: 10px 6px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

        function renderMarksTable(marks, type) {
            if (!marks || marks.length === 0) {
                return '<p style="color: #a0aec0; font-style: italic;">无标记</p>';
            }

            const typeClass = type === 'human' ? 'highlight-human' : 'highlight-ai';

            return `
                <table class="marks-table">
                    <thead>
                        <tr>
                            <th>集数</th>
                            <th>时间点</th>
                            <th>类型</th>
                            ${type === 'ai' ? '<th>详情</th>' : ''}
                        </tr>
                    </thead>
                    <tbody>
                        ${marks.map(mark => {
                            // 对于AI标记，显示大类和具体类型
                            const displayType = type === 'ai' ? getAICategory(mark.type) : mark.type;
                            const showDetail = type === 'ai';

                            return `
                                <tr>
                                    <td class="episode-cell">第${mark.episode}集</td>
                                    <td class="timestamp-cell">${mark.timestamp}</td>
                                    <td class="type-cell">
                                        <span class="highlight-type ${typeClass}">${displayType}</span>
                                    </td>
                                    ${showDetail ? `<td class="detail-cell"><span class="detail-type">${mark.type}</span></td>` : ''}
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderProject(projectData) {
            return `
                <div class="project-section">
                    <h2 class="project-title">${projectData.project}</h2>
                    <div class="marks-grid">
                        <div class="marks-column">
                            <div class="column-header">
                                <h3 class="column-title human-title">人工标记</h3>
                                <span class="count-badge">${projectData.human_marks.length} 个</span>
                            </div>
                            ${renderMarksTable(projectData.human_marks, 'human')}
                        </div>
                        <div class="marks-column">
                            <div class="column-header">
                                <h3 class="column-title ai-title">AI标记</h3>
                                <span class="count-badge">${projectData.ai_marks.length} 个</span>
                            </div>
                            ${renderMarksTable(projectData.ai_marks, 'ai')}
                        </div>
                    </div>
                </div>
            `;
        }

        // Render all projects
        const container = document.getElementById('projects-container');
        container.innerHTML = projectsData.map(renderProject).join('');

</body>
</html>
